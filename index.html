<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0b0f14">
<title>HYBRID AI</title>

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

html,body{
  width:100%;
  height:100%;
}

body{
  font-family:Arial,"Noto Sans Bengali",sans-serif;
  background:#f7f8fa;
  color:#111827;
  overflow:hidden;
}

body.dark{
  background:#0b0f14;
  color:#f3f4f6;
}

button,
textarea{
  font-family:inherit;
}

button{
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}

button:active{
  transform:scale(.96);
}

.app{
  width:100%;
  height:100dvh;
  display:flex;
  flex-direction:column;
}

/* ================= HEADER ================= */

.header{
  height:64px;
  min-height:64px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 15px;
  background:rgba(255,255,255,.96);
  border-bottom:1px solid #e5e7eb;
  position:relative;
  z-index:10;
}

body.dark .header{
  background:#0f1720;
  border-color:#1f2937;
}

.brand-title{
  font-size:20px;
  font-weight:800;
}

.brand-subtitle{
  font-size:7px;
  font-weight:700;
  letter-spacing:1.5px;
  opacity:.55;
  margin-top:2px;
}

.header-actions{
  display:flex;
  gap:5px;
}

.icon-btn{
  width:42px;
  height:42px;
  border:0;
  border-radius:12px;
  background:transparent;
  color:inherit;
  display:inline-flex;
  align-items:center;
  justify-content:center;
}

.icon-btn:hover{
  background:#f1f5f9;
}

body.dark .icon-btn:hover{
  background:#1f2937;
}

/* ================= SVG ICONS ================= */

.icon-svg{
  width:22px;
  height:22px;
  display:block;
  fill:none;
  stroke:currentColor;
  stroke-width:2;
  stroke-linecap:round;
  stroke-linejoin:round;
  pointer-events:none;
}

.icon-svg.fill-icon{
  fill:currentColor;
  stroke:none;
}

/* ================= CHAT ================= */

.chat{
  flex:1;
  overflow-y:auto;
  padding:25px 14px 150px;
  scroll-behavior:smooth;
}

.welcome{
  max-width:760px;
  margin:60px auto 30px;
  text-align:center;
}

.welcome-title{
  font-size:34px;
  font-weight:800;
}

.welcome-subtitle{
  font-size:9px;
  font-weight:700;
  letter-spacing:2px;
  opacity:.55;
  margin-top:6px;
}

.mode-bar{
  display:flex;
  gap:7px;
  overflow-x:auto;
  margin:25px auto 18px;
  scrollbar-width:none;
}

.mode-bar::-webkit-scrollbar{
  display:none;
}

.mode{
  white-space:nowrap;
  padding:9px 15px;
  border:1px solid #e5e7eb;
  border-radius:20px;
  background:#fff;
  color:#111827;
  font-size:12px;
}

.mode.active{
  background:#111827;
  color:#fff;
  border-color:#111827;
}

body.dark .mode{
  background:#111827;
  color:#fff;
  border-color:#374151;
}

body.dark .mode.active{
  background:#fff;
  color:#111827;
}

.suggestions{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:10px;
  max-width:760px;
  margin:20px auto;
}

.suggestion{
  padding:15px;
  text-align:left;
  border:1px solid #e5e7eb;
  border-radius:15px;
  background:#fff;
  color:inherit;
  font-size:14px;
}

.suggestion:hover{
  border-color:#9ca3af;
}

body.dark .suggestion{
  background:#111827;
  border-color:#374151;
}

#messages{
  width:100%;
}

.message{
  max-width:850px;
  margin:16px auto;
  display:flex;
  flex-direction:column;
}

.message.user{
  align-items:flex-end;
}

.message.ai{
  align-items:flex-start;
}

.bubble{
  max-width:88%;
  padding:13px 16px;
  border-radius:17px;
  line-height:1.65;
  white-space:pre-wrap;
  word-break:break-word;
  font-size:15px;
}

.user .bubble{
  background:#111827;
  color:#fff;
  border-bottom-right-radius:5px;
}

.ai .bubble{
  background:#fff;
  color:#111827;
  border:1px solid #e5e7eb;
  border-bottom-left-radius:5px;
}

body.dark .ai .bubble{
  background:#111827;
  color:#f3f4f6;
  border-color:#374151;
}

.message-actions{
  display:flex;
  gap:6px;
  margin-top:7px;
}

.small-btn{
  border:0;
  border-radius:8px;
  padding:6px 9px;
  font-size:11px;
  background:#eef1f5;
  color:#111827;
}

body.dark .small-btn{
  background:#1f2937;
  color:#fff;
}

/* ================= INPUT ================= */

.input-area{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  padding:20px 12px 12px;
  background:linear-gradient(transparent,#f7f8fa 30%);
  z-index:20;
}

body.dark .input-area{
  background:linear-gradient(transparent,#0b0f14 30%);
}

.input-box{
  max-width:850px;
  margin:auto;
  display:flex;
  align-items:flex-end;
  padding:7px;
  background:#fff;
  border:1px solid #dfe3e8;
  border-radius:18px;
  box-shadow:0 8px 30px rgba(0,0,0,.08);
}

body.dark .input-box{
  background:#111827;
  border-color:#374151;
}

textarea{
  flex:1;
  resize:none;
  border:0;
  outline:0;
  padding:11px;
  min-height:44px;
  max-height:130px;
  background:transparent;
  color:inherit;
  font-size:15px;
  line-height:1.5;
}

.voice-btn,
.send-btn{
  width:44px;
  height:44px;
  flex-shrink:0;
  border:0;
  border-radius:13px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
}

.voice-btn{
  background:#eef1f5;
  color:#111827;
  margin-right:6px;
}

body.dark .voice-btn{
  background:#1f2937;
  color:#fff;
}

.voice-btn.recording{
  background:#ef4444;
  color:#fff;
}

.send-btn{
  background:#111827;
  color:#fff;
}

body.dark .send-btn{
  background:#fff;
  color:#111827;
}

.send-btn:disabled{
  opacity:.45;
}

.voice-btn .icon-svg,
.send-btn .icon-svg{
  width:21px;
  height:21px;
}

/* ================= MENU ================= */

.menu-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
  z-index:90;
  display:none;
}

.menu-overlay.open{
  display:block;
}

.side-menu{
  position:fixed;
  top:0;
  right:-330px;
  width:min(310px,88vw);
  height:100dvh;
  background:#fff;
  z-index:100;
  padding:18px;
  transition:right .3s ease;
  overflow-y:auto;
}

.side-menu.open{
  right:0;
}

body.dark .side-menu{
  background:#111827;
}

.menu-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:15px;
}

.menu-title{
  font-size:20px;
  font-weight:700;
}

.menu-actions{
  display:flex;
  gap:7px;
  margin-bottom:15px;
}

.history-item{
  padding:12px;
  border-radius:10px;
  background:#f3f4f6;
  margin:8px 0;
  cursor:pointer;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

body.dark .history-item{
  background:#1f2937;
}

.empty-history{
  opacity:.55;
  font-size:13px;
  padding:15px 5px;
}

/* ================= VOICE MODE ================= */

.voice-mode{
  position:fixed;
  inset:0;
  background:rgba(7,10,15,.98);
  color:#fff;
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:200;
  padding:25px;
}

.voice-mode.active{
  display:flex;
}

.voice-mode-title{
  font-size:22px;
  font-weight:700;
  margin-bottom:8px;
}

.voice-mode-subtitle{
  font-size:12px;
  opacity:.65;
  margin-bottom:30px;
}

.voice-orb{
  width:155px;
  height:155px;
  border-radius:50%;
  border:0;
  background:#111827;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
}

.voice-orb .icon-svg{
  width:55px;
  height:55px;
}

.voice-orb.listening{
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{
    box-shadow:0 0 0 0 rgba(255,255,255,.25)
  }

  70%{
    box-shadow:0 0 0 40px rgba(255,255,255,0)
  }

  100%{
    box-shadow:0 0 0 0 rgba(255,255,255,0)
  }
}

.voice-status{
  margin-top:28px;
  text-align:center;
  min-height:25px;
}

.voice-transcript{
  max-width:600px;
  margin-top:15px;
  text-align:center;
  opacity:.75;
}

.voice-controls{
  display:flex;
  gap:10px;
  margin-top:30px;
}

.voice-control-btn{
  border:0;
  border-radius:12px;
  padding:12px 18px;
  cursor:pointer;
}

/* ================= RESPONSIVE ================= */

@media(max-width:600px){

  .suggestions{
    grid-template-columns:1fr;
  }

  .welcome-title{
    font-size:28px;
  }

  .bubble{
    max-width:92%;
  }

}
</style>
</head>

<body>

<div class="app">

<!-- ================= HEADER ================= -->

<header class="header">

  <div>
    <div class="brand-title">HYBRID AI</div>
    <div class="brand-subtitle">
      SUPER POWER • MULTI-AI
    </div>
  </div>

  <div class="header-actions">

    <!-- THEME BUTTON -->
    <button
      id="themeBtn"
      class="icon-btn"
      type="button"
      aria-label="Toggle theme"
    >

      <svg
        id="themeIcon"
        class="icon-svg"
        viewBox="0 0 24 24"
        aria-hidden="true"
      >
        <path d="M21 12.8A8.5 8.5 0 1 1 11.2 3a6.7 6.7 0 0 0 9.8 9.8Z"></path>
      </svg>

    </button>


    <!-- HISTORY / MENU BUTTON -->
    <button
      id="historyBtn"
      class="icon-btn"
      type="button"
      aria-label="Open chat history"
    >

      <svg
        class="icon-svg"
        viewBox="0 0 24 24"
        aria-hidden="true"
      >
        <path d="M4 6h16"></path>
        <path d="M4 12h16"></path>
        <path d="M4 18h16"></path>
      </svg>

    </button>

  </div>

</header>


<!-- ================= CHAT ================= -->

<main id="chat" class="chat">

<section id="welcome" class="welcome">

  <div class="welcome-title">
    HYBRID AI
  </div>

  <div class="welcome-subtitle">
    SUPER POWER • MULTI-AI
  </div>


  <!-- MODES -->

  <div class="mode-bar">

    <button
      class="mode active"
      data-mode="auto"
      type="button"
    >
      ✨ Auto
    </button>

    <button
      class="mode"
      data-mode="fast"
      type="button"
    >
      ⚡ Fast
    </button>

    <button
      class="mode"
      data-mode="deep"
      type="button"
    >
      🧠 Deep
    </button>

    <button
      class="mode"
      data-mode="creative"
      type="button"
    >
      🎨 Creative
    </button>

  </div>


  <!-- SUGGESTIONS -->

  <div class="suggestions">

    <button
      class="suggestion"
      data-text="আমাকে নতুন কিছু শেখান"
      type="button"
    >
      💡 নতুন কিছু শেখান
    </button>

    <button
      class="suggestion"
      data-text="একটি কঠিন বিষয় সহজভাবে বুঝিয়ে দিন"
      type="button"
    >
      🧠 কঠিন বিষয় বুঝিয়ে দিন
    </button>

    <button
      class="suggestion"
      data-text="আমাকে একটি নতুন ব্যবসার আইডিয়া দিন"
      type="button"
    >
      🚀 ব্যবসার আইডিয়া
    </button>

    <button
      class="suggestion"
      data-text="আমাকে একটি সুন্দর গল্প লিখে দিন"
      type="button"
    >
      ✍️ গল্প লিখুন
    </button>

  </div>

</section>


<div id="messages"></div>

</main>


<!-- ================= INPUT ================= -->

<div class="input-area">

  <div class="input-box">

    <textarea
      id="input"
      rows="1"
      placeholder="HYBRID AI-কে কিছু জিজ্ঞাসা করুন..."
    ></textarea>


    <!-- VOICE BUTTON -->

    <button
      id="voiceBtn"
      class="voice-btn"
      type="button"
      aria-label="Voice mode"
    >

      <svg
        class="icon-svg"
        viewBox="0 0 24 24"
        aria-hidden="true"
      >
        <rect
          x="9"
          y="3"
          width="6"
          height="11"
          rx="3"
        ></rect>

        <path d="M5 11a7 7 0 0 0 14 0"></path>

        <path d="M12 18v3"></path>

        <path d="M8 21h8"></path>

      </svg>

    </button>


    <!-- SEND BUTTON -->

    <button
      id="sendBtn"
      class="send-btn"
      type="button"
      aria-label="Send message"
    >

      <svg
        class="icon-svg"
        viewBox="0 0 24 24"
        aria-hidden="true"
      >

        <path d="M22 2 11 13"></path>

        <path d="m22 2-7 20-4-9-9-4Z"></path>

      </svg>

    </button>

  </div>

</div>

</div>


<!-- ================= SIDE MENU ================= -->

<div
  id="menuOverlay"
  class="menu-overlay"
></div>


<aside
  id="sideMenu"
  class="side-menu"
>

  <div class="menu-top">

    <div class="menu-title">
      Chat History
    </div>

    <button
      id="closeMenu"
      class="icon-btn"
      type="button"
      aria-label="Close menu"
    >

      <svg
        class="icon-svg"
        viewBox="0 0 24 24"
        aria-hidden="true"
      >
        <path d="M6 6l12 12"></path>
        <path d="M18 6 6 18"></path>
      </svg>

    </button>

  </div>


  <div class="menu-actions">

    <button
      id="newChat"
      class="small-btn"
      type="button"
    >
      ＋ New Chat
    </button>

    <button
      id="clearHistory"
      class="small-btn"
      type="button"
    >
      🗑 Clear
    </button>

  </div>


  <div id="history"></div>

</aside>


<!-- ================= VOICE MODE ================= -->

<section
  id="voiceMode"
  class="voice-mode"
>

  <div class="voice-mode-title">
    HYBRID AI Voice Mode
  </div>

  <div class="voice-mode-subtitle">
    কথা বলুন — AI শুনবে এবং উত্তর দেবে
  </div>


  <button
    id="voiceOrb"
    class="voice-orb"
    type="button"
    aria-label="Start voice recognition"
  >

    <svg
      class="icon-svg"
      viewBox="0 0 24 24"
      aria-hidden="true"
    >

      <rect
        x="9"
        y="3"
        width="6"
        height="11"
        rx="3"
      ></rect>

      <path d="M5 11a7 7 0 0 0 14 0"></path>

      <path d="M12 18v3"></path>

      <path d="M8 21h8"></path>

    </svg>

  </button>


  <div
    id="voiceStatus"
    class="voice-status"
  >
    কথা বলার জন্য মাইক্রোফোনে চাপ দিন
  </div>


  <div
    id="voiceTranscript"
    class="voice-transcript"
  ></div>


  <div class="voice-controls">

    <button
      id="stopSpeaking"
      class="voice-control-btn"
      type="button"
    >
      🔇 AI Voice বন্ধ
    </button>

    <button
      id="closeVoice"
      class="voice-control-btn"
      type="button"
    >
      বন্ধ করুন
    </button>

  </div>

</section>


<script>
"use strict";

document.addEventListener("DOMContentLoaded", () => {

  /* =========================
     GET HTML ELEMENTS
  ========================= */

  const input = document.getElementById("input");
  const sendBtn = document.getElementById("sendBtn");
  const voiceBtn = document.getElementById("voiceBtn");

  const themeBtn = document.getElementById("themeBtn");
  const historyBtn = document.getElementById("historyBtn");

  const chat = document.getElementById("chat");
  const messagesEl = document.getElementById("messages");
  const welcome = document.getElementById("welcome");

  const sideMenu = document.getElementById("sideMenu");
  const closeMenu = document.getElementById("closeMenu");
  const menuOverlay = document.getElementById("menuOverlay");

  const newChatBtn = document.getElementById("newChat");
  const clearHistoryBtn = document.getElementById("clearHistory");
  const historyEl = document.getElementById("history");

  const voiceMode = document.getElementById("voiceMode");
  const voiceOrb = document.getElementById("voiceOrb");
  const closeVoiceBtn = document.getElementById("closeVoice");
  const stopSpeakingBtn = document.getElementById("stopSpeaking");

  const voiceStatus = document.getElementById("voiceStatus");
  const voiceTranscript = document.getElementById("voiceTranscript");

  /* =========================
     STATE
  ========================= */

  let isLoading = false;
  let selectedMode = "auto";
  let recognition = null;
  let isListening = false;

  let currentChat = {
    id: Date.now(),
    title: "New Chat",
    messages: []
  };

  /* =========================
     THEME
  ========================= */

  function updateTheme() {

    const savedTheme =
      localStorage.getItem("hybrid_theme");

    if (savedTheme === "dark") {
      document.body.classList.add("dark");
    } else {
      document.body.classList.remove("dark");
    }
  }

  updateTheme();

  if (themeBtn) {

    themeBtn.addEventListener("click", () => {

      document.body.classList.toggle("dark");

      const isDark =
        document.body.classList.contains("dark");

      localStorage.setItem(
        "hybrid_theme",
        isDark ? "dark" : "light"
      );

    });

  }

  /* =========================
     MENU
  ========================= */

  function openMenu() {

    if (sideMenu) {
      sideMenu.classList.add("open");
    }

    if (menuOverlay) {
      menuOverlay.classList.add("open");
    }

    renderHistory();
  }

  function closeMenuFunction() {

    if (sideMenu) {
      sideMenu.classList.remove("open");
    }

    if (menuOverlay) {
      menuOverlay.classList.remove("open");
    }

  }

  if (historyBtn) {
    historyBtn.addEventListener(
      "click",
      openMenu
    );
  }

  if (closeMenu) {
    closeMenu.addEventListener(
      "click",
      closeMenuFunction
    );
  }

  if (menuOverlay) {
    menuOverlay.addEventListener(
      "click",
      closeMenuFunction
    );
  }

  /* =========================
     MODE BUTTONS
  ========================= */

  document
    .querySelectorAll(".mode")
    .forEach((button) => {

      button.addEventListener(
        "click",
        () => {

          document
            .querySelectorAll(".mode")
            .forEach((item) => {
              item.classList.remove("active");
            });

          button.classList.add("active");

          selectedMode =
            button.dataset.mode || "auto";

        }
      );

    });

  /* =========================
     SUGGESTION BUTTONS
  ========================= */

  document
    .querySelectorAll(".suggestion")
    .forEach((button) => {

      button.addEventListener(
        "click",
        () => {

          const text =
            button.dataset.text || "";

          if (input) {

            input.value = text;

            resizeInput();

            input.focus();

          }

        }
      );

    });

  /* =========================
     TEXTAREA RESIZE
  ========================= */

  function resizeInput() {

    if (!input) return;

    input.style.height = "auto";

    input.style.height =
      Math.min(
        input.scrollHeight,
        130
      ) + "px";

  }

  if (input) {

    input.addEventListener(
      "input",
      resizeInput
    );

  }

  /* =========================
     SEND BUTTON
  ========================= */

  if (sendBtn) {

    sendBtn.addEventListener(
      "click",
      () => {

        sendMessage();

      }
    );

  }

  /* =========================
     ENTER TO SEND
  ========================= */

  if (input) {

    input.addEventListener(
      "keydown",
      (event) => {

        if (
          event.key === "Enter" &&
          !event.shiftKey
        ) {

          event.preventDefault();

          sendMessage();

        }

      }
    );

  }

  /* =========================
     SEND MESSAGE
  ========================= */

  async function sendMessage(customText = null) {

    if (isLoading) {
      return;
    }

    const text =
      typeof customText === "string"
        ? customText.trim()
        : input
          ? input.value.trim()
          : "";

    if (!text) {

      if (input) {
        input.focus();
      }

      return;

    }

    if (welcome) {
      welcome.style.display = "none";
    }

    addUserMessage(text);

    currentChat.messages.push({
      role: "user",
      content: text
    });

    if (input) {
      input.value = "";
      resizeInput();
    }

    createChatTitle(text);

    saveCurrentChat();

    isLoading = true;

    if (sendBtn) {
      sendBtn.disabled = true;
    }

    const loadingElement =
      addLoadingMessage();

    try {

      const answer =
        await askAI();

      removeLoadingMessage(
        loadingElement
      );

      addAIMessage(answer);

      currentChat.messages.push({
        role: "assistant",
        content: answer
      });

      saveCurrentChat();

    } catch (error) {

      removeLoadingMessage(
        loadingElement
      );

      addAIMessage(
        "⚠️ দুঃখিত, একটি সমস্যা হয়েছে।\n\n" +
        error.message
      );

      console.error(
        "HYBRID AI Error:",
        error
      );

    } finally {

      isLoading = false;

      if (sendBtn) {
        sendBtn.disabled = false;
      }

    }

  }

  /* =========================
     API REQUEST
  ========================= */

  async function askAI() {

    const response =
      await fetch(
        "/api/chat",
        {
          method: "POST",

          headers: {
            "Content-Type":
              "application/json"
          },

          body: JSON.stringify({

            messages:
              currentChat.messages,

            mode:
              selectedMode

          })

        }
      );

    const contentType =
      response.headers.get(
        "content-type"
      ) || "";

    if (
      !contentType.includes(
        "application/json"
      )
    ) {

      throw new Error(
        "Server থেকে JSON response পাওয়া যায়নি। HTTP Status: " +
        response.status
      );

    }

    const data =
      await response.json();

    if (!response.ok) {

      throw new Error(
        data.error ||
        data.details ||
        "AI request failed."
      );

    }

    if (
      !data.answer ||
      typeof data.answer !== "string"
    ) {

      throw new Error(
        "AI কোনো উত্তর দেয়নি।"
      );

    }

    return data.answer;

  }

  /* =========================
     ADD USER MESSAGE
  ========================= */

  function addUserMessage(text) {

    if (!messagesEl) return;

    const wrapper =
      document.createElement("div");

    wrapper.className =
      "message user";

    const bubble =
      document.createElement("div");

    bubble.className =
      "bubble";

    bubble.textContent =
      text;

    wrapper.appendChild(
      bubble
    );

    messagesEl.appendChild(
      wrapper
    );

    scrollToBottom();

  }

  /* =========================
     ADD AI MESSAGE
  ========================= */

  function addAIMessage(text) {

    if (!messagesEl) return;

    const wrapper =
      document.createElement("div");

    wrapper.className =
      "message ai";

    const bubble =
      document.createElement("div");

    bubble.className =
      "bubble";

    bubble.textContent =
      text;

    wrapper.appendChild(
      bubble
    );

    const actions =
      document.createElement("div");

    actions.className =
      "message-actions";

    /* COPY BUTTON */

    const copyBtn =
      document.createElement("button");

    copyBtn.type =
      "button";

    copyBtn.className =
      "small-btn";

    copyBtn.textContent =
      "📋 Copy";

    copyBtn.addEventListener(
      "click",
      async () => {

        try {

          await navigator.clipboard.writeText(
            text
          );

          copyBtn.textContent =
            "✓ Copied";

          setTimeout(
            () => {
              copyBtn.textContent =
                "📋 Copy";
            },
            1500
          );

        } catch (error) {

          console.error(
            "Copy Error:",
            error
          );

        }

      }
    );

    /* SPEAK BUTTON */

    const speakBtn =
      document.createElement("button");

    speakBtn.type =
      "button";

    speakBtn.className =
      "small-btn";

    speakBtn.textContent =
      "🔊 Speak";

    speakBtn.addEventListener(
      "click",
      () => {

        speakText(text);

      }
    );

    actions.appendChild(
      copyBtn
    );

    actions.appendChild(
      speakBtn
    );

    wrapper.appendChild(
      actions
    );

    messagesEl.appendChild(
      wrapper
    );

    scrollToBottom();

  }

  /* =========================
     LOADING MESSAGE
  ========================= */

  function addLoadingMessage() {

    if (!messagesEl) {
      return null;
    }

    const wrapper =
      document.createElement("div");

    wrapper.className =
      "message ai";

    const bubble =
      document.createElement("div");

    bubble.className =
      "bubble";

    bubble.textContent =
      "HYBRID AI চিন্তা করছে...";

    wrapper.appendChild(
      bubble
    );

    messagesEl.appendChild(
      wrapper
    );

    scrollToBottom();

    return wrapper;

  }

  function removeLoadingMessage(
    element
  ) {

    if (element) {
      element.remove();
    }

  }

  /* =========================
     VOICE MODE
  ========================= */

  if (voiceBtn) {

    voiceBtn.addEventListener(
      "click",
      () => {

        if (voiceMode) {

          voiceMode.classList.add(
            "active"
          );

        }

      }
    );

  }

  if (closeVoiceBtn) {

    closeVoiceBtn.addEventListener(
      "click",
      () => {

        if (voiceMode) {

          voiceMode.classList.remove(
            "active"
          );

        }

        stopRecognition();

        stopSpeaking();

      }
    );

  }

  /* =========================
     SPEECH RECOGNITION
  ========================= */

  const SpeechRecognition =
    window.SpeechRecognition ||
    window.webkitSpeechRecognition;

  if (SpeechRecognition) {

    recognition =
      new SpeechRecognition();

    recognition.continuous =
      false;

    recognition.interimResults =
      false;

    recognition.lang =
      "bn-BD";

    recognition.onstart =
      () => {

        isListening = true;

        if (voiceOrb) {

          voiceOrb.classList.add(
            "listening"
          );

        }

        if (voiceBtn) {

          voiceBtn.classList.add(
            "recording"
          );

        }

        if (voiceStatus) {

          voiceStatus.textContent =
            "শুনছি... কথা বলুন";

        }

      };

    recognition.onresult =
      (event) => {

        const text =
          event
            .results[0][0]
            .transcript;

        if (voiceTranscript) {

          voiceTranscript.textContent =
            "আপনি বলেছেন: " +
            text;

        }

        sendMessage(text);

      };

    recognition.onerror =
      (event) => {

        console.error(
          "Voice Recognition Error:",
          event.error
        );

        if (voiceStatus) {

          voiceStatus.textContent =
            "Voice Error: " +
            event.error;

        }

      };

    recognition.onend =
      () => {

        isListening = false;

        if (voiceOrb) {

          voiceOrb.classList.remove(
            "listening"
          );

        }

        if (voiceBtn) {

          voiceBtn.classList.remove(
            "recording"
          );

        }

      };

  }

  /* =========================
     VOICE ORB BUTTON
  ========================= */

  if (voiceOrb) {

    voiceOrb.addEventListener(
      "click",
      () => {

        if (!recognition) {

          if (voiceStatus) {

            voiceStatus.textContent =
              "আপনার Browser Voice Input সমর্থন করে না।";

          }

          return;

        }

        if (isListening) {

          stopRecognition();

          return;

        }

        try {

          recognition.start();

        } catch (error) {

          console.error(
            "Voice Start Error:",
            error
          );

        }

      }
    );

  }

  function stopRecognition() {

    if (
      recognition &&
      isListening
    ) {

      try {

        recognition.stop();

      } catch (error) {

        console.error(
          error
        );

      }

    }

  }

  /* =========================
     TEXT TO SPEECH
  ========================= */

  function speakText(text) {

    if (
      !("speechSynthesis" in window)
    ) {

      return;

    }

    window.speechSynthesis.cancel();

    const utterance =
      new SpeechSynthesisUtterance(
        text
      );

    utterance.lang =
      /[\u0980-\u09FF]/.test(text)
        ? "bn-BD"
        : "en-US";

    utterance.rate =
      1;

    utterance.pitch =
      1;

    window.speechSynthesis.speak(
      utterance
    );

  }

  function stopSpeaking() {

    if (
      "speechSynthesis" in window
    ) {

      window.speechSynthesis.cancel();

    }

  }

  if (stopSpeakingBtn) {

    stopSpeakingBtn.addEventListener(
      "click",
      () => {

        stopSpeaking();

        if (voiceStatus) {

          voiceStatus.textContent =
            "AI Voice বন্ধ করা হয়েছে";

        }

      }
    );

  }

  /* =========================
     CHAT HISTORY
  ========================= */

  function getHistory() {

    try {

      return JSON.parse(
        localStorage.getItem(
          "hybrid_history"
        ) || "[]"
      );

    } catch (error) {

      console.error(
        "History Error:",
        error
      );

      return [];

    }

  }

  function saveCurrentChat() {

    const chats =
      getHistory();

    const index =
      chats.findIndex(
        (item) =>
          item.id ===
          currentChat.id
      );

    if (index >= 0) {

      chats[index] =
        currentChat;

    } else {

      chats.unshift(
        currentChat
      );

    }

    localStorage.setItem(
      "hybrid_history",
      JSON.stringify(chats)
    );

  }

  function createChatTitle(
    text
  ) {

    if (
      currentChat.title !==
      "New Chat"
    ) {

      return;

    }

    currentChat.title =
      text.length > 40
        ? text.substring(
            0,
            40
          ) + "..."
        : text;

  }

  /* =========================
     RENDER HISTORY
  ========================= */

  function renderHistory() {

    if (!historyEl) return;

    historyEl.innerHTML =
      "";

    const chats =
      getHistory();

    if (
      chats.length === 0
    ) {

      historyEl.innerHTML =
        '<div class="empty-history">এখনও কোনো Chat History নেই।</div>';

      return;

    }

    chats.forEach(
      (chatItem) => {

        const item =
          document.createElement(
            "div"
          );

        item.className =
          "history-item";

        item.textContent =
          chatItem.title ||
          "New Chat";

        item.addEventListener(
          "click",
          () => {

            loadChat(
              chatItem.id
            );

          }
        );

        historyEl.appendChild(
          item
        );

      }
    );

  }

  /* =========================
     LOAD CHAT
  ========================= */

  function loadChat(id) {

    const chats =
      getHistory();

    const found =
      chats.find(
        (item) =>
          item.id === id
      );

    if (!found) {
      return;
    }

    currentChat =
      found;

    if (messagesEl) {

      messagesEl.innerHTML =
        "";

    }

    if (welcome) {

      welcome.style.display =
        "none";

    }

    currentChat.messages
      .forEach(
        (message) => {

          if (
            message.role ===
            "user"
          ) {

            addUserMessage(
              message.content
            );

          }

          if (
            message.role ===
            "assistant"
          ) {

            addAIMessage(
              message.content
            );

          }

        }
      );

    closeMenuFunction();

  }

  /* =========================
     NEW CHAT
  ========================= */

  if (newChatBtn) {

    newChatBtn.addEventListener(
      "click",
      () => {

        currentChat = {
          id: Date.now(),
          title: "New Chat",
          messages: []
        };

        if (messagesEl) {

          messagesEl.innerHTML =
            "";

        }

        if (welcome) {

          welcome.style.display =
            "block";

        }

        closeMenuFunction();

        if (input) {

          input.focus();

        }

      }
    );

  }

  /* =========================
     CLEAR HISTORY
  ========================= */

  if (clearHistoryBtn) {

    clearHistoryBtn.addEventListener(
      "click",
      () => {

        const confirmed =
          confirm(
            "সব Chat History মুছে ফেলবেন?"
          );

        if (!confirmed) {
          return;
        }

        localStorage.removeItem(
          "hybrid_history"
        );

        renderHistory();

      }
    );

  }

  /* =========================
     SCROLL
  ========================= */

  function scrollToBottom() {

    setTimeout(
      () => {

        if (chat) {

          chat.scrollTop =
            chat.scrollHeight;

        }

        window.scrollTo(
          0,
          document.body.scrollHeight
        );

      },
      50
    );

  }

  /* =========================
     DEBUG
  ========================= */

  console.log(
    "HYBRID AI Frontend JavaScript loaded successfully."
  );

  console.log(
    "Send Button:",
    !!sendBtn
  );

  console.log(
    "Voice Button:",
    !!voiceBtn
  );

  console.log(
    "Theme Button:",
    !!themeBtn
  );

  console.log(
    "Menu Button:",
    !!historyBtn
  );

});
  </script>
