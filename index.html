<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0b0f14">

  <title>HYBRID AI</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
    }

    body {
      font-family:
        Arial,
        "Noto Sans Bengali",
        sans-serif;

      background: #f7f8fa;
      color: #111827;

      overflow: hidden;

      transition:
        background 0.25s ease,
        color 0.25s ease;
    }

    body.dark {
      background: #0b0f14;
      color: #f3f4f6;
    }

    button,
    textarea {
      font-family: inherit;
    }

    button {
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      width: 100%;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* HEADER */

    .header {
      height: 64px;
      min-height: 64px;

      padding: 0 15px;

      display: flex;
      align-items: center;
      justify-content: space-between;

      background:
        rgba(255, 255, 255, 0.92);

      border-bottom:
        1px solid #e5e7eb;

      backdrop-filter: blur(15px);

      position: relative;
      z-index: 50;
    }

    body.dark .header {
      background:
        rgba(15, 23, 32, 0.94);

      border-color:
        #1f2937;
    }

    .brand {
      display: flex;
      flex-direction: column;
      user-select: none;
    }

    .brand-title {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 0.5px;
    }

    .brand-subtitle {
      margin-top: 2px;

      font-size: 7px;
      font-weight: 700;

      letter-spacing: 1.5px;

      opacity: 0.55;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .icon-btn {
      width: 40px;
      height: 40px;

      border: none;
      border-radius: 12px;

      display: flex;
      align-items: center;
      justify-content: center;

      background: transparent;
      color: inherit;

      cursor: pointer;

      font-size: 19px;

      transition:
        background 0.2s ease,
        transform 0.2s ease;
    }

    .icon-btn:hover {
      background: #f1f5f9;
    }

    .icon-btn:active {
      transform: scale(0.94);
    }

    body.dark .icon-btn:hover {
      background: #1f2937;
    }

    /* CHAT */

    .chat {
      flex: 1;

      overflow-y: auto;
      overflow-x: hidden;

      padding:
        25px 14px 150px;

      scroll-behavior: smooth;
    }

    .chat::-webkit-scrollbar {
      width: 6px;
    }

    .chat::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }

    body.dark .chat::-webkit-scrollbar-thumb {
      background: #374151;
    }

    .welcome {
      max-width: 760px;

      margin:
        65px auto 30px;

      text-align: center;
    }

    .welcome-title {
      font-size: 34px;
      font-weight: 800;

      margin-bottom: 7px;
    }

    .welcome-subtitle {
      font-size: 9px;
      font-weight: 600;

      letter-spacing: 2px;

      opacity: 0.55;
    }

    /* MODE */

    .mode-bar {
      max-width: 760px;

      margin:
        25px auto 18px;

      display: flex;
      gap: 7px;

      overflow-x: auto;

      scrollbar-width: none;
    }

    .mode-bar::-webkit-scrollbar {
      display: none;
    }

    .mode {
      white-space: nowrap;

      padding:
        8px 14px;

      border:
        1px solid #e5e7eb;

      border-radius: 20px;

      background: #ffffff;
      color: #111827;

      cursor: pointer;

      font-size: 12px;

      transition:
        all 0.2s ease;
    }

    .mode.active {
      background: #111827;
      color: #ffffff;
      border-color: #111827;
    }

    body.dark .mode {
      background: #111827;
      color: #f3f4f6;
      border-color: #374151;
    }

    body.dark .mode.active {
      background: #ffffff;
      color: #111827;
      border-color: #ffffff;
    }

    /* SUGGESTIONS */

    .suggestions {
      max-width: 760px;

      margin:
        20px auto;

      display: grid;

      grid-template-columns:
        repeat(2, minmax(0, 1fr));

      gap: 10px;
    }

    .suggestion {
      padding: 15px;

      text-align: left;

      border:
        1px solid #e5e7eb;

      border-radius: 15px;

      background: #ffffff;
      color: inherit;

      cursor: pointer;

      transition:
        transform 0.2s ease,
        box-shadow 0.2s ease;
    }

    .suggestion:hover {
      transform: translateY(-2px);

      box-shadow:
        0 8px 25px
        rgba(0, 0, 0, 0.07);
    }

    .suggestion:active {
      transform: scale(0.98);
    }

    body.dark .suggestion {
      background: #111827;
      border-color: #374151;
    }

    /* MESSAGES */

    #messages {
      width: 100%;
    }

    .message {
      max-width: 850px;

      margin:
        16px auto;

      display: flex;
      flex-direction: column;
    }

    .message.user {
      align-items: flex-end;
    }

    .message.ai {
      align-items: flex-start;
    }

    .bubble {
      max-width: 88%;

      padding:
        13px 16px;

      border-radius: 17px;

      line-height: 1.65;

      white-space: pre-wrap;
      word-break: break-word;

      font-size: 15px;
    }

    .user .bubble {
      background: #111827;
      color: #ffffff;

      border-bottom-right-radius:
        5px;
    }

    .ai .bubble {
      background: #ffffff;
      color: #111827;

      border:
        1px solid #e5e7eb;

      border-bottom-left-radius:
        5px;
    }

    body.dark .ai .bubble {
      background: #111827;
      color: #f3f4f6;

      border-color:
        #374151;
    }

    .message-actions {
      display: flex;
      gap: 6px;

      margin-top: 7px;
    }

    .small-btn {
      border: none;

      border-radius: 8px;

      padding:
        6px 9px;

      cursor: pointer;

      font-size: 11px;

      background: #eef1f5;
      color: #111827;
    }

    body.dark .small-btn {
      background: #1f2937;
      color: #ffffff;
    }

    /* INPUT */

    .input-area {
      position: fixed;

      bottom: 0;
      left: 0;

      width: 100%;

      padding:
        20px 12px 12px;

      background:
        linear-gradient(
          transparent,
          #f7f8fa 30%
        );

      z-index: 40;
    }

    body.dark .input-area {
      background:
        linear-gradient(
          transparent,
          #0b0f14 30%
        );
    }

    .input-box {
      max-width: 850px;

      margin: auto;

      display: flex;
      align-items: flex-end;

      padding: 7px;

      background: #ffffff;

      border:
        1px solid #dfe3e8;

      border-radius: 18px;

      box-shadow:
        0 8px 30px
        rgba(0, 0, 0, 0.08);
    }

    body.dark .input-box {
      background: #111827;
      border-color: #374151;
    }

    textarea {
      flex: 1;

      resize: none;

      border: none;
      outline: none;

      padding:
        11px;

      min-height: 44px;
      max-height: 130px;

      background: transparent;
      color: inherit;

      font-size: 15px;

      line-height: 1.5;
    }

    .voice-btn,
    .send-btn {
      width: 43px;
      height: 43px;

      flex-shrink: 0;

      border: none;

      border-radius: 13px;

      cursor: pointer;

      font-size: 18px;

      transition:
        transform 0.2s ease,
        opacity 0.2s ease;
    }

    .voice-btn:active,
    .send-btn:active {
      transform: scale(0.92);
    }

    .voice-btn {
      background: #eef1f5;
      color: #111827;

      margin-right: 6px;
    }

    body.dark .voice-btn {
      background: #1f2937;
      color: #ffffff;
    }

    .voice-btn.recording {
      background: #ef4444;
      color: #ffffff;
      animation:
        recordingPulse 1.2s infinite;
    }

    @keyframes recordingPulse {
      50% {
        transform: scale(1.08);
      }
    }

    .send-btn {
      background: #111827;
      color: #ffffff;
    }

    body.dark .send-btn {
      background: #ffffff;
      color: #111827;
    }

    .send-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    /* SIDE MENU */

    .menu-overlay {
      position: fixed;

      inset: 0;

      background:
        rgba(0, 0, 0, 0.35);

      z-index: 90;

      display: none;
    }

    .menu-overlay.open {
      display: block;
    }

    .side-menu {
      position: fixed;

      top: 0;
      right: -330px;

      width: min(310px, 88vw);
      height: 100dvh;

      background: #ffffff;

      z-index: 100;

      padding: 18px;

      transition:
        right 0.3s ease;

      box-shadow:
        -10px 0 30px
        rgba(0, 0, 0, 0.15);

      overflow-y: auto;
    }

    .side-menu.open {
      right: 0;
    }

    body.dark .side-menu {
      background: #111827;
    }

    .menu-top {
      display: flex;

      align-items: center;
      justify-content: space-between;

      margin-bottom: 15px;
    }

    .menu-title {
      font-size: 20px;
      font-weight: 700;
    }

    .menu-actions {
      display: flex;
      gap: 7px;

      margin-bottom: 15px;
    }

    .history-item {
      padding: 12px;

      border-radius: 10px;

      background: #f3f4f6;

      margin: 8px 0;

      cursor: pointer;

      white-space: nowrap;

      overflow: hidden;

      text-overflow: ellipsis;
    }

    body.dark .history-item {
      background: #1f2937;
    }

    .empty-history {
      opacity: 0.55;

      font-size: 13px;

      padding: 15px 5px;
    }

    /* VOICE MODE */

    .voice-mode {
      position: fixed;

      inset: 0;

      background:
        rgba(7, 10, 15, 0.98);

      color: #ffffff;

      display: none;

      flex-direction: column;

      align-items: center;

      justify-content: center;

      z-index: 200;

      padding: 25px;
    }

    .voice-mode.active {
      display: flex;
    }

    .voice-mode-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .voice-mode-subtitle {
      font-size: 12px;
      opacity: 0.65;
      margin-bottom: 30px;
    }

    .voice-orb {
      width: 155px;
      height: 155px;

      border-radius: 50%;

      display: flex;

      align-items: center;
      justify-content: center;

      font-size: 50px;

      background: #111827;

      cursor: pointer;

      box-shadow:
        0 0 0 0
        rgba(255, 255, 255, 0.2);

      transition:
        transform 0.2s ease;
    }

    .voice-orb.listening {
      animation:
        voicePulse 1.5s infinite;
    }

    @keyframes voicePulse {
      0% {
        box-shadow:
          0 0 0 0
          rgba(255, 255, 255, 0.25);
      }

      70% {
        box-shadow:
          0 0 0 40px
          rgba(255, 255, 255, 0);
      }

      100% {
        box-shadow:
          0 0 0 0
          rgba(255, 255, 255, 0);
      }
    }

    .voice-status {
      margin-top: 28px;

      font-size: 16px;

      text-align: center;

      min-height: 25px;
    }

    .voice-transcript {
      max-width: 600px;

      margin-top: 15px;

      min-height: 25px;

      text-align: center;

      opacity: 0.75;

      line-height: 1.6;
    }

    .voice-controls {
      display: flex;

      gap: 10px;

      margin-top: 30px;
    }

    .voice-control-btn {
      border: none;

      border-radius: 12px;

      padding:
        12px 18px;

      cursor: pointer;
    }

    /* RESPONSIVE */

    @media (max-width: 600px) {

      .suggestions {
        grid-template-columns: 1fr;
      }

      .welcome {
        margin-top: 45px;
      }

      .welcome-title {
        font-size: 28px;
      }

      .bubble {
        max-width: 92%;
      }

    }
  </style>
</head>

<body>

  <div class="app">

    <!-- HEADER -->

    <header class="header">

      <div class="brand">

        <div class="brand-title">
          HYBRID AI
        </div>

        <div class="brand-subtitle">
          SUPER POWER • MULTI-AI
        </div>

      </div>

      <div class="header-actions">

        <button
          class="icon-btn"
          id="themeBtn"
          type="button"
          aria-label="Toggle theme"
        >
          🌙
        </button>

        <button
          class="icon-btn"
          id="historyBtn"
          type="button"
          aria-label="Open chat history"
        >
          ☰
        </button>

      </div>

    </header>


    <!-- CHAT -->

    <main
      class="chat"
      id="chat"
    >

      <section
        class="welcome"
        id="welcome"
      >

        <div class="welcome-title">
          HYBRID AI
        </div>

        <div class="welcome-subtitle">
          SUPER POWER • MULTI-AI
        </div>


        <div class="mode-bar">

          <button
            class="mode active"
            data-mode="auto"
            type="button"
          >
            ✨ Auto
          </button>

          <button
            class="mode"
            data-mode="fast"
            type="button"
          >
            ⚡ Fast
          </button>

          <button
            class="mode"
            data-mode="deep"
            type="button"
          >
            🧠 Deep
          </button>

          <button
            class="mode"
            data-mode="creative"
            type="button"
          >
            🎨 Creative
          </button>

        </div>


        <div class="suggestions">

          <button
            class="suggestion"
            data-text="আমাকে নতুন কিছু শেখান"
            type="button"
          >
            💡 নতুন কিছু শেখান
          </button>

          <button
            class="suggestion"
            data-text="একটি কঠিন বিষয় সহজভাবে বুঝিয়ে দিন"
            type="button"
          >
            🧠 কঠিন বিষয় বুঝিয়ে দিন
          </button>

          <button
            class="suggestion"
            data-text="আমাকে একটি নতুন ব্যবসার আইডিয়া দিন"
            type="button"
          >
            🚀 ব্যবসার আইডিয়া
          </button>

          <button
            class="suggestion"
            data-text="আমাকে একটি সুন্দর গল্প লিখে দিন"
            type="button"
          >
            ✍️ গল্প লিখুন
          </button>

        </div>

      </section>


      <div id="messages"></div>

    </main>


    <!-- INPUT -->

    <div class="input-area">

      <div class="input-box">

        <textarea
          id="input"
          rows="1"
          placeholder="HYBRID AI-কে কিছু জিজ্ঞাসা করুন..."
          aria-label="Message"
        ></textarea>

        <button
          class="voice-btn"
          id="voiceBtn"
          type="button"
          aria-label="Open voice mode"
        >
          🎙️
        </button>

        <button
          class="send-btn"
          id="sendBtn"
          type="button"
          aria-label="Send message"
        >
          ➤
        </button>

      </div>

    </div>

  </div>


  <!-- MENU OVERLAY -->

  <div
    class="menu-overlay"
    id="menuOverlay"
  ></div>


  <!-- SIDE MENU -->

  <aside
    class="side-menu"
    id="sideMenu"
  >

    <div class="menu-top">

      <div class="menu-title">
        Chat History
      </div>

      <button
        class="icon-btn"
        id="closeMenu"
        type="button"
        aria-label="Close menu"
      >
        ×
      </button>

    </div>


    <div class="menu-actions">

      <button
        class="small-btn"
        id="newChat"
        type="button"
      >
        ＋ New Chat
      </button>

      <button
        class="small-btn"
        id="clearHistory"
        type="button"
      >
        🗑 Clear
      </button>

    </div>


    <div id="history"></div>

  </aside>


  <!-- VOICE MODE -->

  <section
    class="voice-mode"
    id="voiceMode"
  >

    <div class="voice-mode-title">
      HYBRID AI Voice Mode
    </div>

    <div class="voice-mode-subtitle">
      কথা বলুন — AI শুনবে এবং উত্তর দেবে
    </div>

    <button
      class="voice-orb"
      id="voiceOrb"
      type="button"
      aria-label="Start voice conversation"
    >
      🎙️
    </button>

    <div
      class="voice-status"
      id="voiceStatus"
    >
      কথা বলার জন্য মাইক্রোফোনে চাপ দিন
    </div>

    <div
      class="voice-transcript"
      id="voiceTranscript"
    ></div>

    <div class="voice-controls">

      <button
        class="voice-control-btn"
        id="stopSpeaking"
        type="button"
      >
        🔇 AI Voice বন্ধ
      </button>

      <button
        class="voice-control-btn"
        id="closeVoice"
        type="button"
      >
        বন্ধ করুন
      </button>

    </div>

  </section>


  <script>

    /* =====================================
       GLOBAL STATE
    ===================================== */

    let currentChat = {
      id: Date.now(),
      title: "New Chat",
      messages: []
    };

    let selectedMode = "auto";

    let loading = false;

    let recognition = null;

    let isListening = false;


    /* =====================================
       ELEMENTS
    ===================================== */

    const input =
      document.getElementById("input");

    const sendBtn =
      document.getElementById("sendBtn");

    const messages =
      document.getElementById("messages");

    const welcome =
      document.getElementById("welcome");

    const chat =
      document.getElementById("chat");

    const themeBtn =
      document.getElementById("themeBtn");

    const historyBtn =
      document.getElementById("historyBtn");

    const sideMenu =
      document.getElementById("sideMenu");

    const closeMenu =
      document.getElementById("closeMenu");

    const menuOverlay =
      document.getElementById("menuOverlay");

    const history =
      document.getElementById("history");

    const newChatBtn =
      document.getElementById("newChat");

    const clearHistoryBtn =
      document.getElementById("clearHistory");

    const voiceBtn =
      document.getElementById("voiceBtn");

    const voiceMode =
      document.getElementById("voiceMode");

    const voiceOrb =
      document.getElementById("voiceOrb");

    const voiceStatus =
      document.getElementById("voiceStatus");

    const voiceTranscript =
      document.getElementById("voiceTranscript");

    const stopSpeaking =
      document.getElementById("stopSpeaking");

    const closeVoice =
      document.getElementById("closeVoice");


    /* =====================================
       THEME
    ===================================== */

    const savedTheme =
      localStorage.getItem(
        "hybrid_theme"
      );

    if (savedTheme === "dark") {

      document.body.classList.add(
        "dark"
      );

      themeBtn.textContent =
        "☀️";

    }


    themeBtn.addEventListener(
      "click",
      function () {

        document.body.classList.toggle(
          "dark"
        );

        const isDark =
          document.body.classList.contains(
            "dark"
          );

        localStorage.setItem(
          "hybrid_theme",
          isDark
            ? "dark"
            : "light"
        );

        themeBtn.textContent =
          isDark
            ? "☀️"
            : "🌙";

      }
    );


    /* =====================================
       MODE SELECTOR
    ===================================== */

    document
      .querySelectorAll(".mode")
      .forEach(
        function (button) {

          button.addEventListener(
            "click",
            function () {

              document
                .querySelectorAll(".mode")
                .forEach(
                  function (item) {

                    item.classList.remove(
                      "active"
                    );

                  }
                );

              button.classList.add(
                "active"
              );

              selectedMode =
                button.dataset.mode;

            }
